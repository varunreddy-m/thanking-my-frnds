            padding: 0;
            box-sizing: border-box;
        }

            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Animated Background */
        .stars {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
            opacity: 0.6;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Landing Section */
        .landing {
            position: relative;
            z-index: 10;
            text-align: center;
            animation: slideUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .landing-content {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50px;
            padding: 80px 60px;
            box-shadow: 0 50px 150px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            max-width: 800px;
            width: 100%;
        }

        .emoji-burst {
            font-size: 6em;
            margin-bottom: 20px;
            animation: bounce 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: inline-block;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-40px) rotate(10deg); }
        }

        h1 {
            font-size: 3.5em;
            font-weight: 900;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            letter-spacing: -1px;
            line-height: 1.2;
        }

        .tagline {
            font-size: 1.3em;
            color: #666;
            margin-bottom: 50px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            display: flex;

            gap: 20px;
            margin-bottom: 20px;
        }

        .input-label {

            font-weight: 700;
            color: #333;
            text-align: left;
        }

            border-radius: 25px;

            font-weight: 500;

            max-width: 400px;

        }

        }

            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);

            text-transform: uppercase;
            letter-spacing: 1.5px;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
            transition: left 0.5s;
        }

        }

        }

            top: 0;

</head>

        function generateStars() {
            const container = document.getElementById('starContainer');
            for (let i = 0; i < 50; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                container.appendChild(star);
            }
        }

        function handleSubmit(event) {
            event.preventDefault();
            const name = document.getElementById('nameInput').value.trim().toLowerCase();

            if (name) {
                // Try exact match first, then partial match
                let data = friendData[name];
                
                // If no exact match, try to find partial matches
                if (!data) {
                    for (const key in friendData) {
                        if (key !== 'default' && key.includes(name)) {
                            data = friendData[key];
                            break;
                        }
                    }
                }

                // Use default if no match found
                if (!data) {
                    data = friendData['default'];
                }

                const displayName = document.getElementById('nameInput').value.trim();
                document.getElementById('modalName').textContent = `Thank You, ${displayName}! 🎊`;
                document.getElementById('relationshipTag').textContent = data.relationship;
                document.getElementById('personalMessage').innerHTML = data.message(displayName);

                if (data.image) {
                    document.getElementById('memoryImage').src = data.image;
                    document.getElementById('memoryImage').style.display = 'block';
                    document.getElementById('imagePlaceholder').style.display = 'none';
                } else {
                    document.getElementById('memoryImage').style.display = 'none';
                    document.getElementById('imagePlaceholder').style.display = 'flex';
                }

                document.getElementById('thankYouModal').style.display = 'block';
                createConfetti();
            }
        }

        function closeModal() {
            document.getElementById('thankYouModal').style.display = 'none';
            document.getElementById('nameInput').value = '';
        }

        function shareMessage() {
            const name = document.getElementById('nameInput').value;
            const text = `${name}, I received this special thank you message! 🎉`;
            
            if (navigator.share) {
                navigator.share({
                    title: 'Birthday Thank You',
                    text: text,
                    url: window.location.href
                });
            } else {
                alert('Thanks for celebrating with me! 💝');
            }
        }

                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * window.innerWidth + 'px';
                    confetti.style.top = '-50px';
                    confetti.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    confetti.style.fontSize = Math.random() * 25 + 20 + 'px';
                    confetti.style.opacity = Math.random() * 0.8 + 0.3;

                    document.body.appendChild(confetti);

                    let pos = 0;
                    const speed = Math.random() * 4 + 2;
                    const drift = Math.random() * 150 - 75;

                    const animate = () => {
                        pos += speed;
                        confetti.style.transform = `translate(${Math.sin(pos * 0.02) * drift}px, ${pos}px) rotate(${pos * 4}deg)`;

                        if (pos < window.innerHeight + 100) {
                            requestAnimationFrame(animate);
                        } else {
                            confetti.remove();
                        }
                    };

                    animate();
                }, i * 10);
            }
        }

        window.addEventListener('click', (e) => {
            const modal = document.getElementById('thankYouModal');
            if (e.target === modal) {
                closeModal();
            }
        });

        generateStars();
    </script>
</body>
</html>
